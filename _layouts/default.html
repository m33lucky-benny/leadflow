<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <!-- CSP - Strict Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net https://formspree.io;
    style-src 'self' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https:;
    connect-src 'self' https://formspree.io https://serpapi.com;
    frame-src 'none';
    object-src 'none';
    base-uri 'self';
    form-action 'self' https://formspree.io;
    upgrade-insecure-requests;
  ">
  
  <!-- Additional Security Headers (set via server config for production) -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  
  <!-- SEO -->
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  
  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  
  {{ site.google_analytics }}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  {% include header.html %}
  
  <main id="main-content" role="main">
    {{ content }}
  </main>
  
  {% include footer.html %}
  {% include scripts.html %}
</body>
</html>
